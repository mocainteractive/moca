const data = [
  {
    id: 1,
    cat: "SEO",

4. DESCRIZIONE COMPLETA (HTML)`,

Per ogni ipotesi indica:

- Impatto potenziale se confermata

Concludi con una checklist diagnostica prioritizzata.`,

  {

Struttura l'analisi in questo ordine:

Tono: professionale ma accessibile. Evita il gergo tecnico non spiegato.`,

const catColors = { seo: 'tag-seo', analytics: 'tag-analytics', strategy: 'tag-strategy', automation: 'tag-automation', content: 'tag-content', client: 'tag-client' };
const catLabels = { seo: 'SEO', analytics: 'Analytics', strategy: 'Strategy', automation: 'Automation', content: 'Content', client: 'Client Mgmt' };

let activeFilter = 'all';
let currentItem = null;

function renderPills() {
  const cats = ['all', ...new Set(data.map(d => d.tag))];
  const container = document.getElementById('pills');
  container.innerHTML = cats.map(c => {
    const label = c === 'all' ? 'Tutti' : catLabels[c] || c;
    return `<span class="pill ${c === activeFilter ? 'active' : ''}" onclick="setFilter('${c}')">${label}</span>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderPills();
  filterCards();
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = data.filter(d => {
    const matchCat = activeFilter === 'all' || d.tag === activeFilter;
    const matchQ = !q || d.title.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q) || d.vars.join(' ').toLowerCase().includes(q) || d.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderGrid(filtered);
}

function renderGrid(items) {
  const grid = document.getElementById('grid');
  const bar = document.getElementById('countBar');
  bar.textContent = `${items.length} prompt disponibili`;
  if (!items.length) {
    grid.innerHTML = '<div class="empty">Nessun prompt trovato. Prova con un altro termine.</div>';
    return;
  }
  grid.innerHTML = items.map(d => `
    <div class="card" onclick="openModal(${d.id})">
      <div class="card-top">
        <span class="card-title">${d.title}</span>
        <span class="tag ${catColors[d.tag]}">${catLabels[d.tag]}</span>
      </div>
      <div class="card-desc">${d.desc}</div>
      <div class="card-vars">${d.vars.map(v => `<span class="var-badge">${v}</span>`).join('')}</div>
      <div class="card-footer">
        <span style="font-size:11px;color:#aaa;">Clicca per espandere</span>
        <button class="copy-btn" onclick="event.stopPropagation();copyPrompt(${d.id},this)">Copia prompt</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const d = data.find(x => x.id === id);
  currentItem = d;
  document.getElementById('modalTag').innerHTML = `<span class="tag ${catColors[d.tag]}">${catLabels[d.tag]}</span>`;
  document.getElementById('modalTitle').textContent = d.title;
  document.getElementById('modalBody').innerHTML = `
    <div>
      <div class="modal-section-label">Prompt</div>
      <div class="prompt-box">${d.prompt}</div>
    </div>
    <div>
      <div class="modal-section-label">Variabili</div>
      <div class="card-vars" style="gap:6px">${d.vars.map(v => `<span class="var-badge" style="font-size:12px;padding:3px 9px">${v}</span>`).join('')}</div>
    </div>
    ${d.example ? `<div>
      <div class="modal-section-label">Esempio di input</div>
      <div class="example-box">${d.example}</div>
    </div>` : ''}
    ${d.tip ? `<div>
      <div class="modal-section-label">Tip operativo</div>
      <div class="tip-box">💡 ${d.tip}</div>
    </div>` : ''}
    <div class="modal-cta">
      <button class="btn-primary" onclick="copyPrompt(${d.id}, this)">Copia prompt</button>
      <button class="btn-secondary" onclick="closeModal()">Chiudi</button>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

function copyPrompt(id, btn) {
  const d = data.find(x => x.id === id);
  navigator.clipboard.writeText(d.prompt).then(() => {
    const prev = btn.textContent;
    btn.textContent = 'Copiato!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = prev; btn.classList.remove('copied'); }, 1800);
  });
}

renderPills();
filterCards();
</script>
